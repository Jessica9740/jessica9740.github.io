<!DOCTYPE html>
<html lang="{{ config.site.language | default('ko') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.site.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.site.description }}{% endblock %}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent: #7c6aff;
      --accent-light: #a78bfa;
      --green: #34d399;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'Fira Code', 'Cascadia Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.7;
      min-height: 100vh;
    }

    a { color: var(--accent-light); text-decoration: none; }
    a:hover { color: var(--accent); text-decoration: underline; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 0;
      position: sticky;
      top: 0;
      background: rgba(15, 17, 23, 0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    header .inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    header .logo span { color: var(--accent); }

    header nav a {
      color: var(--muted);
      font-size: 0.9rem;
      margin-left: 1.5rem;
    }

    header nav a:hover { color: var(--text); text-decoration: none; }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .tag {
      display: inline-block;
      background: rgba(124, 106, 255, 0.15);
      color: var(--accent-light);
      border: 1px solid rgba(124, 106, 255, 0.3);
      border-radius: 4px;
      padding: 0.15rem 0.6rem;
      font-size: 0.78rem;
      font-weight: 500;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <div class="inner">
      <a href="/" class="logo">{{ config.site.title }}<span>.</span></a>
      <nav>
        <a href="/">홈</a>
        <a href="/posts/">글 목록</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>© {{ config.site.author }} · Powered by <strong>Claude AI</strong> &amp; Auto Blog</p>
  </footer>
</body>
</html>
